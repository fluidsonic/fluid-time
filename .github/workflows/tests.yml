name: Tests

on: [push, pull_request]

jobs:
  js:
    name: JS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew jsTest
  jvm:
    name: JVM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - run: ./gradlew jvmTest
